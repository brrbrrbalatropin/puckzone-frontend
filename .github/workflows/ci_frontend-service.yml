name: CI/CD - PuckZone Frontend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/puckzone-frontend

# Permisos del GITHUB_TOKEN por job (minimo privilegio): cada job declara
# solo lo que usa en vez de heredar permisos a nivel workflow.
jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline
          # Vite hornea la URL del gateway en build time. Definir la variable de
          # repositorio VITE_API_URL cuando exista el gateway en Azure; mientras
          # esté vacía, el código cae al fallback http://localhost:8080.
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_TURN_URL=${{ vars.VITE_TURN_URL }}
            VITE_TURN_USERNAME=${{ vars.VITE_TURN_USERNAME }}
            VITE_TURN_CREDENTIAL=${{ vars.VITE_TURN_CREDENTIAL }}

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    # No usa el GITHUB_TOKEN (azure/login autentica con AZURE_CREDENTIALS).
    permissions: {}

    steps:
      - name: Log in to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Tag del SHA (no latest): fuerza revision nueva y permite rollback.
      # Coincide con el tag corto que publica docker/metadata-action (type=sha).
      - name: Update Container App image
        run: |
          az containerapp update \
            --name puckzone-frontend \
            --resource-group puckzone-rg \
            --image ${{ env.IMAGE_NAME }}:${GITHUB_SHA::7}

  # Analisis estatico en SonarCloud con el scanner generico (aqui no hay
  # Maven): la configuracion vive en sonar-project.properties de la raiz.
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Historia completa del repo: Sonar atribuye codigo nuevo vs viejo.
          fetch-depth: 0

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5.3.2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
