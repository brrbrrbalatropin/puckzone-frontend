server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta de react-router (p. ej. /lobby recargado) debe
    # resolver a index.html; los assets existentes se sirven directo.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Los bundles de Vite llevan hash en el nombre: cachear agresivamente.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
